<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportstech · Abholung buchen</title>
<meta name="theme-color" content="#fafaf9">
<meta name="description" content="Buchen Sie Ihre einmalige GLS-Abholung über Ihren persönlichen Sportstech-Link.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
(function(){
  try { document.documentElement.setAttribute('data-lang', new URLSearchParams(location.search).get('lang') || localStorage.getItem('pickup_lang') || 'de'); }
  catch(_) { document.documentElement.setAttribute('data-lang', 'de'); }
})();
function tr(de, en){
  return (document.documentElement.getAttribute('data-lang')||'de') === 'en' ? en : de;
}
function setLang(lang){
  document.documentElement.setAttribute('data-lang', lang);
  try { localStorage.setItem('pickup_lang', lang); } catch(_) {}
  document.querySelectorAll('[data-lang-toggle]').forEach(b => {
    b.textContent = lang === 'de' ? 'EN' : 'DE';
  });
  if (typeof render === 'function') render();
}
function toggleLang(){
  const cur = document.documentElement.getAttribute('data-lang') || 'de';
  setLang(cur === 'de' ? 'en' : 'de');
}
</script>
<style>
/* ════════════════════════════════════════════════════════════════════
   Sportstech Pickup — neutral, professional, calm.
   System: warm neutrals + a single subtle red brand accent.
   ════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Surfaces */
  --bg:         #fafaf9;     /* warm off-white page */
  --surface:    #ffffff;     /* card */
  --surface-2:  #f5f5f4;     /* subtle inset */
  --surface-3:  #f0efed;     /* hover wash */

  /* Borders */
  --border:        #e7e5e4;
  --border-strong: #d6d3d1;
  --border-focus:  #e3000f;

  /* Text */
  --text:    #18181b;
  --text-2:  #44403c;
  --text-3:  #78716c;
  --text-4:  #a8a29e;

  /* Accents — Sportstech */
  --brand:        #e3000f;   /* Sportstech red — primary action */
  --brand-2:      #b80009;   /* hover / pressed */
  --brand-3:      #8a0008;   /* deep red — type accent */
  --brand-soft:   #fef2f3;   /* very light red wash */
  --brand-tint:   rgba(227, 0, 15, 0.08);
  --brand-ring:   rgba(227, 0, 15, 0.18);
  --success: #15803d;
  --success-soft: #f0fdf4;
  --warning: #b45309;
  --warning-soft: #fffbeb;
  --error:   #b91c1c;
  --error-soft: #fef2f2;
  --info:    #1d4ed8;
  --info-soft: #eff6ff;

  /* Type */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --mono: 'DM Mono', ui-monospace, "SF Mono", Menlo, monospace;

  /* Radii */
  --r-sm: 8px;
  --r:    12px;
  --r-lg: 16px;
  --r-xl: 20px;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(24, 24, 27, 0.04);
  --shadow:    0 1px 3px rgba(24, 24, 27, 0.06), 0 1px 2px rgba(24, 24, 27, 0.04);
  --shadow-lg: 0 10px 30px -12px rgba(24, 24, 27, 0.18), 0 2px 6px rgba(24,24,27,0.05);
}

html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01";
}

html[data-lang="en"] .t-de { display: none; }
html[data-lang="de"] .t-en { display: none; }

a { color: var(--text); }
a:hover { color: var(--brand); }

::selection { background: var(--brand-ring); color: var(--text); }

/* ── Header ─────────────────────────────────────────────────────────── */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: saturate(180%) blur(10px);
  box-shadow: inset 0 -3px 0 var(--brand);
}
.site-header-inner {
  max-width: 720px; margin: 0 auto;
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand-mark {
  display: inline-flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.brand-logo {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--brand); color: #fff;
  width: 28px; height: 28px; border-radius: 6px;
  font-weight: 800; font-size: 15px;
  letter-spacing: -0.04em;
  font-family: var(--font);
}
.brand-name {
  font-weight: 700; font-size: 16px; color: var(--text);
  letter-spacing: -0.015em;
  text-transform: uppercase;
}
.brand-name span.accent { color: var(--brand); }
.lang-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 11px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.lang-btn:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); }

/* ── Page ───────────────────────────────────────────────────────────── */
.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}

/* ── Intro ──────────────────────────────────────────────────────────── */
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--brand);
  margin-bottom: 16px;
}
.eyebrow-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--brand);
  display: inline-block;
  box-shadow: 0 0 0 3px var(--brand-tint);
}
h1.title {
  font-size: 32px; font-weight: 700; letter-spacing: -0.025em;
  line-height: 1.15; color: var(--text);
  margin-bottom: 12px;
}
.lede {
  font-size: 16px; color: var(--text-2); line-height: 1.6;
  margin-bottom: 28px; max-width: 560px;
}

/* ── Trust strip ────────────────────────────────────────────────────── */
.trust {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-sm);
}
.trust-icon {
  width: 32px; height: 32px; flex-shrink: 0;
  border-radius: 8px;
  background: var(--success-soft);
  color: var(--success);
  display: inline-flex; align-items: center; justify-content: center;
}
.trust-icon svg { width: 16px; height: 16px; }
.trust-text {
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.5;
}
.trust-text strong { color: var(--text); font-weight: 600; }

/* ── Section ────────────────────────────────────────────────────────── */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.section:focus-within { border-color: var(--border-strong); box-shadow: var(--shadow); }

.section-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--brand);
  color: #fff;
  font-size: 12px; font-weight: 700;
  margin-right: 10px;
  vertical-align: text-bottom;
  box-shadow: 0 1px 2px var(--brand-ring);
}
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px; margin-bottom: 4px;
}
.section-title {
  font-size: 17px; font-weight: 600; color: var(--text);
  letter-spacing: -0.01em;
}
.section-meta {
  font-family: var(--mono);
  font-size: 11px; color: var(--text-3);
  letter-spacing: 0.04em;
}
.section-sub {
  font-size: 14px; color: var(--text-3);
  margin-bottom: 20px;
  padding-left: 34px;
}

/* ── Form ───────────────────────────────────────────────────────────── */
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field-row {
  display: grid; grid-template-columns: 1fr 2fr; gap: 12px;
  margin-bottom: 16px;
}
label.lbl {
  display: block;
  font-size: 13px; font-weight: 500; color: var(--text-2);
  margin-bottom: 6px;
}
input.txt, select.txt, textarea.txt {
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 11px 14px;
  font-size: 15px;
  font-family: var(--font);
  line-height: 1.4;
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
  appearance: none;
}
textarea.txt {
  resize: vertical; min-height: 76px; line-height: 1.5;
}
input.txt::placeholder, textarea.txt::placeholder { color: var(--text-4); }
input.txt:hover, select.txt:hover, textarea.txt:hover {
  border-color: var(--border-strong);
}
input.txt:focus, select.txt:focus, textarea.txt:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-tint);
}
input.txt:invalid:not(:placeholder-shown) {
  border-color: var(--error);
}
.hint {
  font-size: 12.5px; color: var(--text-3);
  margin-top: 6px; line-height: 1.4;
}

/* ── Slot picker ────────────────────────────────────────────────────── */
.slot-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.slot {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 13px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-family: var(--font);
  text-align: left;
  transition: all 0.15s;
  position: relative;
}
.slot:hover {
  border-color: var(--border-strong);
  background: var(--surface-2);
}
.slot:focus-visible {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-tint);
}
.slot.active {
  border-color: var(--brand);
  background: var(--brand);
  color: #fff;
  box-shadow: 0 6px 18px -6px var(--brand-ring);
}
.slot.active::after {
  content: ''; position: absolute; top: 10px; right: 10px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 8L6.5 11L12.5 5' stroke='%23e3000f' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-size: 14px 14px;
}
.slot-date {
  font-size: 11px; font-weight: 500; font-family: var(--mono);
  color: var(--text-3);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 2px;
}
.slot.active .slot-date { color: rgba(255,255,255,0.78); }
.slot-time {
  font-size: 14.5px; font-weight: 500;
}

/* ── Error msg ──────────────────────────────────────────────────────── */
.error-msg {
  display: none;
  font-size: 13.5px; color: var(--error);
  background: var(--error-soft);
  border: 1px solid rgba(185, 28, 28, 0.20);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  margin: 16px 0 0;
}
.error-msg.show { display: block; }

/* ── CTA ────────────────────────────────────────────────────────────── */
.cta-bar {
  margin-top: 24px;
  display: flex; align-items: center; gap: 14px;
}
.cta {
  flex: 1;
  background: var(--brand);
  color: #fff;
  border: 0;
  border-radius: var(--r);
  padding: 15px 22px;
  font-size: 15px; font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: -0.005em;
  box-shadow: 0 4px 14px -4px var(--brand-ring), inset 0 1px 0 rgba(255,255,255,0.12);
}
.cta:hover:not(:disabled) {
  background: var(--brand-2);
  box-shadow: 0 10px 26px -8px var(--brand-ring), inset 0 1px 0 rgba(255,255,255,0.12);
  transform: translateY(-1px);
}
.cta:active:not(:disabled) {
  background: var(--brand-3);
  transform: translateY(0);
  box-shadow: 0 2px 8px -2px var(--brand-ring), inset 0 1px 0 rgba(255,255,255,0.10);
}
.cta:disabled { opacity: 0.4; cursor: not-allowed; }
.cta:focus-visible {
  outline: 3px solid var(--brand-ring);
  outline-offset: 2px;
}

.cta-note {
  font-size: 12px; color: var(--text-3); text-align: center;
  margin-top: 14px;
  line-height: 1.5;
}

/* ── Confirmation ───────────────────────────────────────────────────── */
.conf-wrap {
  text-align: center;
  padding: 8px 0 0;
}
.conf-check {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: var(--success-soft);
  color: var(--success);
  display: inline-flex; align-items: center; justify-content: center;
  position: relative;
  animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.conf-check svg { width: 28px; height: 28px; }
.conf-check::before {
  content: ''; position: absolute; inset: -6px;
  border-radius: 50%; border: 2px solid var(--success-soft);
  opacity: 0;
  animation: pulse-ring 1.6s ease-out infinite;
}
@keyframes pop {
  0% { transform: scale(0.6); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes pulse-ring {
  0% { transform: scale(0.95); opacity: 0.5; }
  100% { transform: scale(1.2); opacity: 0; }
}
.conf-title {
  font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text); margin-bottom: 8px;
}
.conf-sub {
  font-size: 15px; color: var(--text-2);
  margin-bottom: 28px; line-height: 1.6;
  max-width: 460px; margin-left: auto; margin-right: auto;
}

.detail-list {
  text-align: left;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 8px 20px;
  margin-bottom: 16px;
}
.detail-row {
  display: grid; grid-template-columns: 130px 1fr;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.detail-row:last-child { border-bottom: 0; }
.detail-key {
  font-size: 12.5px; font-weight: 500;
  color: var(--text-3);
}
.detail-val {
  font-size: 14.5px; color: var(--text);
  word-break: break-word;
}
.detail-val.mono {
  font-family: var(--mono);
  font-size: 13.5px; font-weight: 500;
  letter-spacing: 0.02em;
}

/* ── Timeline ───────────────────────────────────────────────────────── */
.timeline {
  position: relative;
  padding: 4px 0 4px 28px;
}
.timeline::before {
  content: ''; position: absolute;
  left: 9px; top: 14px; bottom: 14px; width: 2px;
  background: var(--border);
}
.step { position: relative; padding: 6px 0 14px; }
.step:last-child { padding-bottom: 0; }
.step::before {
  content: ''; position: absolute;
  left: -23px; top: 9px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--border-strong);
  z-index: 1;
}
.step.done::before {
  background: var(--success); border-color: var(--success);
}
.step.done::after {
  content: ''; position: absolute;
  left: -19px; top: 13px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #fff;
  z-index: 2;
}
.step.active::before {
  background: #fff;
  border-color: var(--brand);
  box-shadow: 0 0 0 4px var(--brand-tint);
  animation: pulse-active 2s ease-in-out infinite;
}
@keyframes pulse-active {
  0%, 100% { box-shadow: 0 0 0 4px var(--brand-tint); }
  50% { box-shadow: 0 0 0 7px rgba(227, 0, 15, 0.04); }
}
.step-title {
  font-size: 14.5px; font-weight: 500; color: var(--text);
  margin-bottom: 2px;
}
.step.pending .step-title { color: var(--text-3); font-weight: 400; }
.step-meta {
  font-family: var(--mono); font-size: 11.5px; color: var(--text-3);
  letter-spacing: 0.02em;
}

/* ── Info note ──────────────────────────────────────────────────────── */
.note {
  background: var(--info-soft);
  border: 1px solid rgba(29, 78, 216, 0.15);
  border-radius: var(--r);
  padding: 14px 16px;
  font-size: 13.5px; color: var(--text-2);
  line-height: 1.55;
  display: flex; align-items: flex-start; gap: 12px;
}
.note-icon {
  flex-shrink: 0;
  width: 20px; height: 20px;
  color: var(--info);
}
.note strong { color: var(--text); }

/* ── State pages (invalid / expired / cancelled) ───────────────────── */
.state-card {
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 56px 32px 44px;
  box-shadow: var(--shadow);
}
.state-icon {
  width: 56px; height: 56px;
  margin: 0 auto 20px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
}
.state-icon.warn  { background: var(--warning-soft); color: var(--warning); }
.state-icon.err   { background: var(--error-soft);   color: var(--error); }
.state-icon.info  { background: var(--info-soft);    color: var(--info); }
.state-icon svg { width: 24px; height: 24px; }
.state-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text); margin-bottom: 10px;
}
.state-text {
  font-size: 15px; color: var(--text-2); line-height: 1.6;
  max-width: 440px; margin: 0 auto 20px;
}
.state-help {
  font-size: 13px; color: var(--text-3);
  padding-top: 16px; border-top: 1px solid var(--border);
  margin-top: 22px;
}
.state-help a {
  color: var(--brand); font-weight: 600; text-decoration: none;
  border-bottom: 1px solid var(--brand-ring);
  padding-bottom: 1px;
  transition: border-color 0.15s;
}
.state-help a:hover { border-color: var(--brand); }

/* ── Loading ────────────────────────────────────────────────────────── */
.loading-wrap {
  text-align: center;
  padding: 100px 20px;
  color: var(--text-3);
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
  margin-right: 10px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 14px; color: var(--text-3);
  vertical-align: middle;
}

/* ── Footer ─────────────────────────────────────────────────────────── */
.site-footer {
  border-top: 1px solid var(--border);
  background: var(--surface);
  margin-top: 24px;
}
.site-footer-inner {
  max-width: 720px; margin: 0 auto;
  padding: 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  font-size: 12.5px; color: var(--text-3);
}
.site-footer a {
  color: var(--text-3); text-decoration: none;
  margin-left: 16px;
}
.site-footer a:hover { color: var(--brand); }
.gls-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11.5px; color: var(--text-3);
  font-family: var(--mono); letter-spacing: 0.04em;
}
.gls-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-4);
}

/* ── Draft banner ───────────────────────────────────────────────────── */
.draft-banner {
  background: var(--warning-soft);
  border-bottom: 1px solid rgba(180, 83, 9, 0.20);
  color: var(--warning);
  padding: 7px 16px;
  font-family: var(--mono); font-size: 11px;
  text-align: center; letter-spacing: 0.10em;
  text-transform: uppercase;
}

/* ── Mobile ─────────────────────────────────────────────────────────── */
@media (max-width: 560px) {
  .page { padding: 32px 16px 60px; }
  h1.title { font-size: 26px; }
  .lede { font-size: 15px; }
  .section { padding: 20px; }
  .section-sub { padding-left: 0; }
  .field-row { grid-template-columns: 1fr; gap: 16px; }
  .slot-grid { grid-template-columns: 1fr; }
  .detail-row { grid-template-columns: 1fr; gap: 2px; padding: 12px 0; }
  .detail-key { font-size: 12px; }
  .state-card { padding: 44px 22px 32px; }
  .site-footer-inner { flex-direction: column; align-items: flex-start; }
  .site-footer a { margin: 0 16px 0 0; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
}
</style>
</head>
<body>

<!-- Draft marker — entferne diese Zeile beim Go-Live -->
<div class="draft-banner">

<script>
// ════════════════════════════════════════════════════════════════════════
// DRAFT — mock layer. Compatible with internal CS console (GLS-Pickup.html)
// via shared localStorage key. Replace marked sections with real API later.
// ════════════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'gls_pickup_tokens_draft';

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch (_) { return {}; }
}
function saveStore(store) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch (_) {}
}

/* Seed demo tokens so the page is testable out of the box.
   Production: tokens live only on the server. */
(function seedIfEmpty(){
  const store = loadStore();
  if (Object.keys(store).length === 0) {
    const now = Date.now();
    store['DEMO-OPEN'] = {
      status: 'ISSUED',
      customer: { name: 'Max Mustermann', email: 'max@example.com' },
      reason: 'Defekt: Laufband S-Run',
      ticket: '#412938',
      issuedAt: now - 3600_000,
      expiresAt: now + 7 * 86400_000
    };
    store['DEMO-USED'] = {
      status: 'CONFIRMED',
      customer: { name: 'Anna Beispiel', email: 'anna@example.com' },
      reason: 'Defekt: Rudergerät RX-Pro',
      ticket: '#413001',
      issuedAt: now - 2 * 86400_000,
      expiresAt: now + 5 * 86400_000,
      submittedAt: now - 86400_000,
      booking: {
        glsRef: '0123456789AB',
        address: 'Musterstr. 12, 10115 Berlin',
        phone: '+49 30 1234567',
        slot: '2026-05-26 / 09:00–13:00',
        confirmedAt: now - 86400_000 + 3600_000
      }
    };
    store['DEMO-EXPIRED'] = {
      status: 'ISSUED',
      customer: { name: 'Test Ablauf', email: 'expired@example.com' },
      reason: 'Defekt: Crosstrainer',
      ticket: '#410001',
      issuedAt: now - 30 * 86400_000,
      expiresAt: now - 86400_000
    };
    saveStore(store);
  }
})();

/* Mock pickup slots — replaced by real GLS slots later. */
function nextSlots() {
  const slots = [];
  let d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+1);
  for (let i = 0; i < 3; i++) {
    while (d.getDay() === 0) d.setDate(d.getDate()+1);
    const iso = d.toISOString().slice(0,10);
    const human = d.toLocaleDateString(tr('de-DE','en-GB'), { weekday:'long', day:'2-digit', month:'long' });
    slots.push({ iso, human, window: '09:00 – 13:00', label: tr('Vormittag','Morning') });
    slots.push({ iso, human, window: '13:00 – 18:00', label: tr('Nachmittag','Afternoon') });
    d.setDate(d.getDate()+1);
  }
  return slots;
}

function getToken() {
  const u = new URL(location.href);
  return (u.searchParams.get('t') || u.searchParams.get('token') || '').trim();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

/* ── SVG icon set (inline so no extra requests) ──────────────────── */
const I = {
  shield: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`,
  check:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
  warn:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`,
  x:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`,
  link:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  info:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`
};

/* ── Router ──────────────────────────────────────────────────────── */
function render() {
  const root = document.getElementById('root');
  const token = getToken();

  if (!token) return renderState(root, 'NO_TOKEN');

  const store = loadStore();
  const rec = store[token];
  if (!rec) return renderState(root, 'UNKNOWN');
  if (rec.expiresAt && Date.now() > rec.expiresAt && rec.status === 'ISSUED') return renderState(root, 'EXPIRED');
  if (rec.status === 'CANCELLED') return renderState(root, 'CANCELLED');

  if (rec.status !== 'ISSUED') return renderTracking(root, token, rec);
  return renderForm(root, token, rec);
}

/* ── Error / state pages ─────────────────────────────────────────── */
function renderState(root, kind) {
  const map = {
    NO_TOKEN:  { icon: 'warn', tone: 'warn', title: [tr('Link unvollständig', 'Link incomplete'),
                  tr('In Ihrem Link fehlt ein Teil. Bitte öffnen Sie ihn erneut direkt aus unserer E-Mail.',
                     'Part of your link is missing. Please open it again directly from our email.')] },
    UNKNOWN:   { icon: 'x', tone: 'err', title: [tr('Link nicht gefunden', 'Link not found'),
                  tr('Wir konnten diesen Abhol-Link nicht zuordnen. Bitte prüfen Sie, ob Sie den vollständigen Link aus unserer E-Mail geöffnet haben.',
                     'We could not match this pickup link. Please check that you opened the complete link from our email.')] },
    EXPIRED:   { icon: 'warn', tone: 'warn', title: [tr('Link abgelaufen', 'Link expired'),
                  tr('Dieser Abhol-Link ist nicht mehr gültig. Unser Support stellt Ihnen sehr gerne einen neuen Link aus.',
                     'This pickup link is no longer valid. Our support team will gladly issue a new link for you.')] },
    CANCELLED: { icon: 'info', tone: 'info', title: [tr('Buchung storniert', 'Booking cancelled'),
                  tr('Diese Abholung wurde storniert. Bei Fragen ist unser Support gerne für Sie da.',
                     'This pickup was cancelled. Our support team is happy to help if you have questions.')] }
  };
  const cfg = map[kind] || map.UNKNOWN;
  root.innerHTML = `
    <div class="state-card">
      <div class="state-icon ${cfg.tone}">${I[cfg.icon]}</div>
      <div class="state-title">${cfg.title[0]}</div>
      <div class="state-text">${cfg.title[1]}</div>
      <div class="state-help">
        <span class="t-de">Hilfe benötigt? Schreiben Sie an</span>
        <span class="t-en">Need help? Email us at</span>
        &nbsp;<a href="mailto:service@sportstech.de">service@sportstech.de</a>
      </div>
    </div>`;
}

/* ── Booking form ────────────────────────────────────────────────── */
function renderForm(root, token, rec) {
  const slots = nextSlots();
  const firstName = (rec.customer?.name || '').split(' ')[0] || tr('Hallo','Hi');

  root.innerHTML = `
    <div class="eyebrow">
      <span class="eyebrow-dot" aria-hidden="true"></span>
      <span class="t-de">EINMALIGE ABHOLUNG</span>
      <span class="t-en">ONE-TIME PICKUP</span>
    </div>

    <h1 class="title">
      <span class="t-de">${escapeHtml(firstName)}, lassen Sie uns Ihre Abholung buchen.</span>
      <span class="t-en">${escapeHtml(firstName)}, let's book your pickup.</span>
    </h1>
    <p class="lede">
      <span class="t-de">Geben Sie kurz Ihre Abholadresse und ein Zeitfenster an. Sie müssen nichts ausdrucken — GLS bringt das Versandlabel direkt mit.</span>
      <span class="t-en">Just enter your pickup address and a time window. No printing required — GLS will bring the shipping label.</span>
    </p>

    <div class="trust">
      <div class="trust-icon" aria-hidden="true">${I.shield}</div>
      <div class="trust-text">
        <span class="t-de"><strong>Sichere Einmal-Verbindung.</strong> Dieser Link ist persönlich für Sie und kann nur einmal verwendet werden. Sie können Ihre Buchung danach jederzeit über denselben Link verfolgen.</span>
        <span class="t-en"><strong>Secure one-time link.</strong> This link is personal to you and can only be used once. After booking you can return to it any time to track your pickup.</span>
      </div>
    </div>

    <form id="booking-form" onsubmit="event.preventDefault(); submitForm('${token}');" novalidate>

      <section class="section">
        <div class="section-head">
          <div class="section-title">
            <span class="section-num">1</span>
            <span class="t-de">Abholadresse</span>
            <span class="t-en">Pickup address</span>
          </div>
        </div>
        <div class="section-sub">
          <span class="t-de">Wohin soll GLS kommen?</span>
          <span class="t-en">Where should GLS come to?</span>
        </div>

        <div class="field">
          <label class="lbl" for="f-name"><span class="t-de">Vor- und Nachname</span><span class="t-en">Full name</span></label>
          <input class="txt" id="f-name" type="text" autocomplete="name" value="${escapeHtml(rec.customer.name)}" required>
        </div>

        <div class="field">
          <label class="lbl" for="f-street"><span class="t-de">Straße & Hausnummer</span><span class="t-en">Street & number</span></label>
          <input class="txt" id="f-street" type="text" autocomplete="street-address" placeholder="${tr('Musterstraße 12','Sample Street 12')}" required>
        </div>

        <div class="field-row">
          <div>
            <label class="lbl" for="f-zip"><span class="t-de">PLZ</span><span class="t-en">ZIP</span></label>
            <input class="txt" id="f-zip" type="text" inputmode="numeric" autocomplete="postal-code" pattern="[0-9]{5}" maxlength="5" placeholder="10115" required>
          </div>
          <div>
            <label class="lbl" for="f-city"><span class="t-de">Stadt</span><span class="t-en">City</span></label>
            <input class="txt" id="f-city" type="text" autocomplete="address-level2" placeholder="${tr('Berlin','Berlin')}" required>
          </div>
        </div>

        <div class="field">
          <label class="lbl" for="f-phone"><span class="t-de">Telefon für GLS</span><span class="t-en">Phone for GLS</span></label>
          <input class="txt" id="f-phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="+49 …" required>
          <div class="hint"><span class="t-de">Wird nur genutzt, wenn der Fahrer Sie vor Ort nicht erreichen kann.</span><span class="t-en">Only used if the driver can't reach you on site.</span></div>
        </div>

        <div class="field">
          <label class="lbl" for="f-note"><span class="t-de">Hinweis für den Fahrer (optional)</span><span class="t-en">Note for the driver (optional)</span></label>
          <textarea class="txt" id="f-note" placeholder="${tr('z.B. „Hinterhaus, 2. OG links“ · „bei Schmidt klingeln“','e.g. \\'Back building, 2nd floor left\\' · \\'ring at Smith\\'')}"></textarea>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <div class="section-title">
            <span class="section-num">2</span>
            <span class="t-de">Wunsch-Zeitfenster</span>
            <span class="t-en">Preferred time window</span>
          </div>
        </div>
        <div class="section-sub">
          <span class="t-de">Wählen Sie ein Zeitfenster, das Ihnen passt.</span>
          <span class="t-en">Pick a time window that suits you.</span>
        </div>

        <div class="slot-grid" id="slot-grid" role="radiogroup" aria-label="${tr('Zeitfenster','Time window')}">
          ${slots.map((s, i) => `
            <button type="button" class="slot${i===0?' active':''}"
                    role="radio" aria-checked="${i===0?'true':'false'}"
                    data-slot='${JSON.stringify(s)}' onclick="pickSlot(this)">
              <span class="slot-date">${s.human}</span>
              <span class="slot-time">${s.window}</span>
            </button>`).join('')}
        </div>
      </section>

      <div class="error-msg" id="err" role="alert"></div>

      <div class="cta-bar">
        <button type="submit" class="cta">
          ${I.check}
          <span class="t-de">Abholung verbindlich buchen</span>
          <span class="t-en">Confirm pickup</span>
        </button>
      </div>
      <div class="cta-note">
        <span class="t-de">Mit dem Klick bestätigen Sie die Abholung. GLS sendet keine Bestätigungs-SMS.</span>
        <span class="t-en">Clicking confirms the pickup. GLS does not send a confirmation SMS.</span>
      </div>
    </form>
  `;
}

function pickSlot(el) {
  document.querySelectorAll('.slot').forEach(s => {
    s.classList.remove('active');
    s.setAttribute('aria-checked', 'false');
  });
  el.classList.add('active');
  el.setAttribute('aria-checked', 'true');
}

function submitForm(token) {
  const err = document.getElementById('err');
  err.classList.remove('show'); err.textContent = '';

  const name   = document.getElementById('f-name').value.trim();
  const street = document.getElementById('f-street').value.trim();
  const zip    = document.getElementById('f-zip').value.trim();
  const city   = document.getElementById('f-city').value.trim();
  const phone  = document.getElementById('f-phone').value.trim();
  const note   = document.getElementById('f-note').value.trim();
  const slotEl = document.querySelector('.slot.active');

  if (!name || !street || !zip || !city || !phone || !slotEl) {
    err.textContent = tr('Bitte ergänzen Sie alle Pflichtfelder.', 'Please complete all required fields.');
    err.classList.add('show');
    err.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  if (!/^[0-9]{5}$/.test(zip)) {
    err.textContent = tr('Bitte geben Sie eine gültige Postleitzahl ein.', 'Please enter a valid postal code.');
    err.classList.add('show');
    return;
  }
  if (!/^[+\d\s\-()/.]{6,}$/.test(phone)) {
    err.textContent = tr('Bitte geben Sie eine gültige Telefonnummer ein.', 'Please enter a valid phone number.');
    err.classList.add('show');
    return;
  }

  const slot = JSON.parse(slotEl.dataset.slot);

  // TODO ─ GLS API integration point ─────────────────────────────────────
  // POST /api/gls-pickup/book { token, name, street, zip, city, phone, note, slot }
  //   → server validates token still ISSUED + not expired
  //   → server calls official GLS API to create the pickup order
  //   → on success, marks token CONFIRMED with returned glsRef
  // Below is the draft mock that mutates localStorage to demo single-use enforcement.
  const store = loadStore();
  const rec = store[token];
  if (!rec || rec.status !== 'ISSUED') {
    err.textContent = tr('Dieser Link wurde inzwischen bereits verwendet.', 'This link has already been used.');
    err.classList.add('show');
    setTimeout(render, 1000); return;
  }
  rec.status = 'CONFIRMED';
  rec.submittedAt = Date.now();
  rec.booking = {
    glsRef: 'GLS-' + Math.random().toString(36).slice(2, 12).toUpperCase(),
    address: `${street}, ${zip} ${city}`,
    name, phone, note,
    slot: `${slot.iso} · ${slot.window}`,
    slotHuman: `${slot.human} · ${slot.window}`,
    confirmedAt: Date.now()
  };
  saveStore(store);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // ─────────────────────────────────────────────────────────────────────
}

/* ── Tracking view (after booking) ───────────────────────────────── */
function renderTracking(root, token, rec) {
  const b = rec.booking || {};
  const status = rec.status; // CONFIRMED | PICKED_UP | COMPLETED
  const order = ['CONFIRMED', 'PICKED_UP', 'COMPLETED'];
  const idx = order.indexOf(status);
  const steps = [
    { key: 'CONFIRMED',  title: tr('Abholung gebucht',           'Pickup booked'),
      meta: b.confirmedAt ? fmtTs(b.confirmedAt) : '' },
    { key: 'PICKED_UP',  title: tr('Paket vom Fahrer abgeholt',  'Parcel collected by driver'),
      meta: '' },
    { key: 'COMPLETED',  title: tr('Bei Sportstech eingegangen', 'Arrived at Sportstech'),
      meta: '' }
  ];

  root.innerHTML = `
    <div class="eyebrow">
      <span class="eyebrow-dot" aria-hidden="true"></span>
      <span class="t-de">ABHOLUNG GEBUCHT</span>
      <span class="t-en">PICKUP BOOKED</span>
    </div>

    <div class="conf-wrap">
      <div class="conf-check" aria-hidden="true">${I.check}</div>
      <h1 class="conf-title">
        <span class="t-de">Alles erledigt.</span>
        <span class="t-en">All set.</span>
      </h1>
      <p class="conf-sub">
        <span class="t-de">GLS holt Ihr Paket im gewählten Zeitfenster ab. Sie müssen nichts weiter tun — das Versandetikett bringt der Fahrer mit.</span>
        <span class="t-en">GLS will collect your parcel in the chosen time window. Nothing else to do — the driver brings the shipping label.</span>
      </p>
    </div>

    <div class="detail-list">
      <div class="detail-row">
        <div class="detail-key"><span class="t-de">Buchungsnummer</span><span class="t-en">Booking number</span></div>
        <div class="detail-val mono">${escapeHtml(b.glsRef || '—')}</div>
      </div>
      <div class="detail-row">
        <div class="detail-key"><span class="t-de">Abholadresse</span><span class="t-en">Pickup address</span></div>
        <div class="detail-val">${escapeHtml(b.address || '—')}</div>
      </div>
      <div class="detail-row">
        <div class="detail-key"><span class="t-de">Zeitfenster</span><span class="t-en">Time window</span></div>
        <div class="detail-val">${escapeHtml(b.slotHuman || b.slot || '—')}</div>
      </div>
      <div class="detail-row">
        <div class="detail-key"><span class="t-de">Ticket</span><span class="t-en">Ticket</span></div>
        <div class="detail-val mono">${escapeHtml(rec.ticket || '—')}</div>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="t-de">Status</span>
          <span class="t-en">Status</span>
        </div>
        <div class="section-meta">${tr('aktualisiert','updated')} · ${fmtTs(Date.now())}</div>
      </div>
      <div class="timeline">
        ${steps.map((s, i) => {
          const cls = i < idx ? 'done' : i === idx ? 'active' : 'pending';
          return `<div class="step ${cls}">
            <div class="step-title">${s.title}</div>
            <div class="step-meta">${s.meta || (i === idx ? tr('aktuell','current') : tr('ausstehend','pending'))}</div>
          </div>`;
        }).join('')}
      </div>
    </section>

    <div class="note">
      <span class="note-icon" aria-hidden="true">${I.info}</span>
      <div>
        <span class="t-de"><strong>Diesen Link als Lesezeichen speichern.</strong> Über denselben Link sehen Sie jederzeit den aktuellen Status — eine zweite Buchung ist nicht mehr möglich.</span>
        <span class="t-en"><strong>Bookmark this link.</strong> The same link will show you the current status any time — a second booking is no longer possible.</span>
      </div>
    </div>

    <div class="state-help" style="text-align:center; margin-top: 24px;">
      <span class="t-de">Etwas stimmt nicht? Schreiben Sie an</span>
      <span class="t-en">Something off? Email us at</span>
      &nbsp;<a href="mailto:service@sportstech.de">service@sportstech.de</a>
    </div>
  `;
}

function fmtTs(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString(tr('de-DE','en-GB'), {
    day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
  });
}

/* ── Boot ────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
